<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores 2</title>
</head>
<body>
    
    <script>
        /*
            Operadores relacionais:
            7 > 5 -> true
            5 > 5 -> false

            5 < 5 -> false
            5 < 6 -> true

            6 >= 6 -> true
            6 >= 5 -> false

            3 <= 5 -> false
            3 <= 2 -> true

            8 == 2 -> false
            8 == 8 -> true

            5 != 10 -> true
            10 != 10 -> false

            Operadores de Identidade:

            5 == '5' -> true
            5 === '5' -> false

            Lógicos:

                Negação:

                ! true = false
                ! false = true

                Conjunção:

                true  && true  -> true
                true  && false -> false
                false && true  -> false
                false && false -> false

                Disjunção:

                true  || true  -> true
                true  || false -> false
                false || true  -> false
                false || false -> false
        
        Ternário:

        teste ? true : false
        media >= 7 ? aprovado : reprovado
        
        */
    </script>
</body>
</html>
