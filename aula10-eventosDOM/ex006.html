<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        div#area {
            font: bold 20pt Arial;
            background-color: green;
            color: white;
            width: 200px;
            height: 200px;
            text-align: center;
            line-height: 200px;
        }
    </style>
</head>
<body>
    <div id="area">
        Interaja.
    </div>
    <script>

        var text = window.document.getElementById('area')
        text.addEventListener('click', clicar)
        text.addEventListener('mouseout', sair)
        text.addEventListener('mouseenter', entrar)

        function clicar() {
            text.innerText = 'Clicou!'
            text.style.background = 'red'
            text.style.color = 'white'
        }
        function entrar() {
            text.style.backgroundColor = 'yellow'
            text.style.color = 'black'
        }
        function sair() {
            text.style.background = 'green'
            text.innerText = 'Interaja.'
            text.style.color = 'white'
        }
        
    </script>
</body>
</html>
